name: deploy-redirect
on:
  push:
    branches:
      - master
      - main
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish redirect bridge to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # redirect/ 만 담은 orphan gh-pages 브랜치를 새로 만들어
          # 기존 MkDocs 빌드 산출물을 완전히 비우고 강제 푸시한다
          cd redirect
          git init -q
          git checkout -q -b gh-pages
          git add -A
          git commit -q -m "Deploy redirect bridge to bnbong.com"
          git push -q --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
